<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --surface3: #222235;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affcc;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --border: #2a2a40;
    --me-bubble: linear-gradient(135deg, #7c6aff, #5a4de6);
    --other-bubble: #1e1e2e;
    --ai-bubble: linear-gradient(135deg, #1e1e2e, #16162a);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ════════════════ LOGIN ════════════════ */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1230 0%, var(--bg) 70%);
  }

  .login-box {
    width: 380px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,106,255,0.1);
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .login-logo .orb {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 20px rgba(124,106,255,0.5);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 20px rgba(124,106,255,0.5); }
    50%      { box-shadow: 0 0 35px rgba(124,106,255,0.8), 0 0 60px rgba(255,106,158,0.2); }
  }

  .login-logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .login-box p.sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
  }

  .login-btns {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-primary {
    flex: 1;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), #5a4de6);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }

  .btn-secondary:hover { background: var(--surface2); border-color: var(--accent); }

  #authMsg {
    margin-top: 12px;
    font-size: 12px;
    text-align: center;
    color: var(--accent2);
    min-height: 16px;
  }

  /* ════════════════ APP ════════════════ */
  #appScreen {
    display: none;
    height: 100vh;
    flex-direction: row;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo .orb-sm {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px rgba(124,106,255,0.4);
  }

  .sidebar-logo span {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

  .sidebar-me {
    padding: 12px 20px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-section {
    padding: 10px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .users-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 10px 10px;
  }

  .users-list::-webkit-scrollbar { width: 4px; }
  .users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .user-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
  }

  .user-item:hover { background: var(--surface2); }
  .user-item.active { background: var(--surface3); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    box-shadow: 0 0 12px rgba(124,106,255,0.4);
    font-size: 16px;
  }

  .avatar.human {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .user-info { flex: 1; min-width: 0; }

  .user-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
    box-shadow: 0 0 5px rgba(106,255,204,0.5);
  }

  .dot.offline { background: var(--border); box-shadow: none; }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 65px;
  }

  .chat-header-info { flex: 1; }

  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
  }

  .chat-header-status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .chat-header-status.typing { color: var(--accent3); }

  /* empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
  }

  .empty-orb {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(255,106,158,0.15));
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    color: var(--text);
  }

  .empty-state p { font-size: 13px; }

  /* messages */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: msgIn 0.25s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
  }

  .msg-row.me .msg-avatar { display: none; }

  .bubble {
    max-width: 60%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
    word-break: break-word;
  }

  .msg-row.me .bubble {
    background: var(--me-bubble);
    border-bottom-right-radius: 4px;
    color: #fff;
    box-shadow: 0 4px 15px rgba(124,106,255,0.3);
  }

  .msg-row.other .bubble {
    background: var(--other-bubble);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg-row.ai .bubble {
    background: var(--ai-bubble);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(124,106,255,0.3);
    box-shadow: 0 4px 15px rgba(124,106,255,0.1);
  }

  .ai-tag {
    font-size: 10px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .bubble-time {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    text-align: right;
  }

  .msg-row.other .bubble-time,
  .msg-row.ai .bubble-time { color: var(--muted); text-align: left; }

  .tick { font-size: 11px; }
  .tick.seen { color: var(--accent3); }

  .bubble img { max-width: 200px; border-radius: 8px; display: block; margin-top: 6px; }
  .bubble audio { margin-top: 6px; width: 200px; }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 14px;
    background: var(--other-bubble);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* input bar */
  .input-bar {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  .input-wrap input[type="text"] {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 0;
  }

  .input-wrap input[type="text"]::placeholder { color: var(--muted); }

  .file-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }
  .file-btn:hover { color: var(--accent); }

  #fileInput { display: none; }

  .send-btn, .voice-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 18px;
    transition: transform 0.15s, opacity 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .send-btn {
    background: linear-gradient(135deg, var(--accent), #5a4de6);
    box-shadow: 0 4px 15px rgba(124,106,255,0.35);
  }

  .voice-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .send-btn:hover, .voice-btn:hover { transform: translateY(-1px); opacity: 0.9; }
  .voice-btn.recording { background: var(--accent2); border-color: var(--accent2); animation: recordPulse 1s ease-in-out infinite; }

  @keyframes recordPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,106,158,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(255,106,158,0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="orb"></div>
      <h1>Noor Chat</h1>
    </div>
    <p class="sub">Your secure, AI-powered messenger</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="••••••••">
    </div>

    <div class="login-btns">
      <button class="btn-primary" onclick="loginUser()">Login</button>
      <button class="btn-secondary" onclick="signupUser()">Sign Up</button>
    </div>
    <div id="authMsg"></div>
  </div>
</div>

<!-- ════ APP ════ -->
<div id="appScreen">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="orb-sm"></div>
        <span>Noor</span>
      </div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
    <div class="sidebar-me" id="sidebarMe"></div>
    <div class="sidebar-section">Conversations</div>
    <div class="users-list" id="usersList"></div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-orb">💬</div>
      <h3>Welcome to Noor Chat</h3>
      <p>Select a contact or chat with Noor AI</p>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIGURATION — set your Supabase details
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://qmztuswterlneulqomc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenR1c3Z0ZXJsZm5ldWxxb21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDYyMDMsImV4cCI6MjA4OTUyMjIwM30.Qba4aiV9jETl__yxu0Aj_Ulq_sK7eGGUMW1YQPKUtvs';
const GROQ_KEY = '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';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentUser = null;
let currentChat = null;   // { uid, name, isAI }
let msgSubscription = null;
let typingTimeout = null;
let isRecording = false;
let recorder = null;
let audioChunks = [];

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
async function signupUser() {
  const email = emailInput.value.trim();
  const pass  = passInput.value;
  authMsg.textContent = '';

  const { data, error } = await supabase.auth.signUp({ email, password: pass });
  if (error) return setMsg('⚠ ' + error.message);

  // insert profile
  await supabase.from('profiles').upsert({
    id: data.user.id,
    email,
    online: true,
    typing: false,
    updated_at: new Date().toISOString()
  });

  setMsg('✅ Check your email to confirm, then log in!');
}

async function loginUser() {
  const email = emailInput.value.trim();
  const pass  = passInput.value;
  authMsg.textContent = '';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) return setMsg('⚠ ' + error.message);

  await supabase.from('profiles').upsert({
    id: data.user.id,
    email,
    online: true,
    typing: false,
    updated_at: new Date().toISOString()
  });
}

async function logout() {
  if (currentUser) {
    await supabase.from('profiles').update({ online: false }).eq('id', currentUser.id);
  }
  await supabase.auth.signOut();
}

function setMsg(t) { authMsg.textContent = t; }

// ══════════════════════════════════════════
//  AUTH STATE
// ══════════════════════════════════════════
supabase.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    currentUser = session.user;
    loginScreen.style.display  = 'none';
    appScreen.style.display    = 'flex';
    sidebarMe.textContent      = '👤 ' + currentUser.email;
    loadUsers();
  } else {
    currentUser = null;
    loginScreen.style.display  = 'flex';
    appScreen.style.display    = 'none';
  }
});

// ══════════════════════════════════════════
//  USERS LIST
// ══════════════════════════════════════════
async function loadUsers() {
  const { data: profiles } = await supabase
    .from('profiles')
    .select('*')
    .neq('id', currentUser.id);

  renderUsers(profiles || []);

  // realtime presence
  supabase.channel('profiles-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => loadUsers())
    .subscribe();
}

function renderUsers(profiles) {
  const list = document.getElementById('usersList');
  list.innerHTML = '';

  // AI first
  const aiItem = makeUserItem('AI_BOT', '✦', 'Noor AI', 'Powered by Groq · LLaMA', true, true);
  list.appendChild(aiItem);

  profiles.forEach(p => {
    const initials = p.email[0].toUpperCase();
    const item = makeUserItem(p.id, initials, p.email, p.online ? 'Online' : 'Offline', false, p.online);
    list.appendChild(item);
  });
}

function makeUserItem(uid, initials, name, sub, isAI, online) {
  const div = document.createElement('div');
  div.className = 'user-item' + (currentChat?.uid === uid ? ' active' : '');

  div.innerHTML = `
    <div class="avatar ${isAI ? 'ai' : 'human'}">${initials}</div>
    <div class="user-info">
      <div class="user-name">${escHtml(name)}</div>
      <div class="user-sub">${escHtml(sub)}</div>
    </div>
    <div class="dot ${online ? '' : 'offline'}"></div>
  `;

  div.onclick = () => openChat(uid, name, isAI);
  return div;
}

// ══════════════════════════════════════════
//  OPEN CHAT
// ══════════════════════════════════════════
function openChat(uid, name, isAI = false) {
  currentChat = { uid, name, isAI };

  // update sidebar active
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  event?.currentTarget?.classList.add('active');

  // unsubscribe old
  if (msgSubscription) {
    supabase.removeChannel(msgSubscription);
    msgSubscription = null;
  }

  // build chat shell
  const chatArea = document.getElementById('chatArea');
  const avatarChar = isAI ? '✦' : name[0].toUpperCase();
  const avatarClass = isAI ? 'ai' : 'human';

  chatArea.innerHTML = `
    <div class="chat-header">
      <div class="avatar ${avatarClass}" style="width:36px;height:36px">${avatarChar}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${escHtml(name)}</div>
        <div class="chat-header-status" id="chatStatus">${isAI ? 'Noor AI · Groq LLaMA' : 'Loading...'}</div>
      </div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="msgInput" placeholder="Message ${escHtml(name)}…"
          oninput="onTyping()" onblur="stopTyping()"
          onkeydown="if(event.key==='Enter') sendMsg()">
        ${!isAI ? `<button class="file-btn" onclick="fileInput.click()" title="Send image">📎</button>
        <input type="file" id="fileInput" accept="image/*" onchange="sendFile()">` : ''}
      </div>
      ${!isAI ? `<button class="voice-btn" id="voiceBtn" onclick="toggleRecording()" title="Voice message">🎤</button>` : ''}
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  `;

  loadMessages();

  if (!isAI) watchTyping(uid);
}

// ══════════════════════════════════════════
//  LOAD & SUBSCRIBE MESSAGES
// ══════════════════════════════════════════
async function loadMessages() {
  if (!currentChat) return;

  const { data } = await supabase
    .from('messages')
    .select('*')
    .or(`and(from_id.eq.${currentUser.id},to_id.eq.${currentChat.uid}),and(from_id.eq.${currentChat.uid},to_id.eq.${currentUser.id})`)
    .order('created_at', { ascending: true });

  const area = document.getElementById('messagesArea');
  if (!area) return;
  area.innerHTML = '';
  (data || []).forEach(m => appendMsg(m, false));
  area.scrollTop = area.scrollHeight;

  // mark as seen
  if (data) {
    const unseen = data.filter(m => m.to_id === currentUser.id && !m.seen).map(m => m.id);
    if (unseen.length) {
      await supabase.from('messages').update({ seen: true }).in('id', unseen);
    }
  }

  // realtime
  msgSubscription = supabase.channel('msgs-' + Date.now())
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async payload => {
      const m = payload.new;
      const relevant =
        (m.from_id === currentUser.id && m.to_id === currentChat?.uid) ||
        (m.from_id === currentChat?.uid && m.to_id === currentUser.id);
      if (relevant) {
        appendMsg(m, true);
        if (m.to_id === currentUser.id && !m.seen) {
          await supabase.from('messages').update({ seen: true }).eq('id', m.id);
        }
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, payload => {
      const m = payload.new;
      const el = document.querySelector(`[data-msgid="${m.id}"] .tick`);
      if (el && m.seen) { el.textContent = ' ✔✔'; el.classList.add('seen'); }
    })
    .subscribe();
}

function appendMsg(m, scroll) {
  const area = document.getElementById('messagesArea');
  if (!area) return;

  const isMe = m.from_id === currentUser.id;
  const isAIMsg = m.from_id === 'AI_BOT';
  const rowClass = isMe ? 'me' : (isAIMsg ? 'ai' : 'other');

  const timeStr = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const tick = isMe ? `<span class="tick ${m.seen ? 'seen' : ''}">${m.seen ? ' ✔✔' : ' ✔'}</span>` : '';
  const avatarChar = isAIMsg ? '✦' : (currentChat?.name?.[0]?.toUpperCase() || '?');
  const avatarClass = isAIMsg ? 'ai' : 'human';

  const aiTag = isAIMsg ? `<div class="ai-tag">✦ Noor AI</div>` : '';

  let content = '';
  if (m.text) content += escHtml(m.text).replace(/\n/g, '<br>');
  if (m.image_url) content += `<img src="${m.image_url}" alt="image">`;
  if (m.voice_url) content += `<audio controls src="${m.voice_url}"></audio>`;

  const row = document.createElement('div');
  row.className = `msg-row ${rowClass}`;
  row.dataset.msgid = m.id;
  row.innerHTML = `
    <div class="msg-avatar avatar ${avatarClass}">${avatarChar}</div>
    <div class="bubble">
      ${aiTag}
      ${content}
      <div class="bubble-time">${timeStr}${tick}</div>
    </div>
  `;

  area.appendChild(row);
  if (scroll) area.scrollTop = area.scrollHeight;
}

// ══════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════
async function sendMsg() {
  const input = document.getElementById('msgInput');
  if (!input || !currentChat) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  stopTyping();

  const msg = {
    from_id: currentUser.id,
    to_id: currentChat.uid,
    text,
    seen: false,
    created_at: new Date().toISOString()
  };

  await supabase.from('messages').insert(msg);

  if (currentChat.isAI) {
    showTypingIndicator();
    const reply = await getGroqReply(text);
    hideTypingIndicator();
    await supabase.from('messages').insert({
      from_id: 'AI_BOT',
      to_id: currentUser.id,
      text: reply,
      seen: true,
      created_at: new Date().toISOString()
    });
  }
}

// ══════════════════════════════════════════
//  GROQ AI
// ══════════════════════════════════════════
async function getGroqReply(message) {
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: 'llama3-70b-8192',
        messages: [
          { role: 'system', content: 'You are Noor, a friendly and smart AI assistant inside a chat app called Noor Chat. Be concise, warm, and helpful.' },
          { role: 'user', content: message }
        ],
        max_tokens: 500
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'Sorry, I could not respond right now.';
  } catch {
    return 'AI is temporarily unavailable. Please try again.';
  }
}

// ══════════════════════════════════════════
//  TYPING INDICATOR
// ══════════════════════════════════════════
function showTypingIndicator() {
  const area = document.getElementById('messagesArea');
  if (!area) return;
  const el = document.createElement('div');
  el.id = 'aiTyping';
  el.className = 'msg-row ai';
  el.innerHTML = `
    <div class="msg-avatar avatar ai">✦</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function hideTypingIndicator() {
  document.getElementById('aiTyping')?.remove();
}

function onTyping() {
  if (!currentChat || currentChat.isAI) return;
  supabase.from('profiles').update({ typing: true }).eq('id', currentUser.id);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (!currentChat || currentChat.isAI) return;
  supabase.from('profiles').update({ typing: false }).eq('id', currentUser.id);
}

function watchTyping(uid) {
  supabase.channel('typing-' + uid)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${uid}` }, payload => {
      const status = document.getElementById('chatStatus');
      if (!status) return;
      status.textContent = payload.new.typing ? 'typing…' : (payload.new.online ? 'Online' : 'Offline');
      status.className = 'chat-header-status' + (payload.new.typing ? ' typing' : '');
    })
    .subscribe();
}

// ══════════════════════════════════════════
//  FILE UPLOAD (images via Supabase Storage)
// ══════════════════════════════════════════
async function sendFile() {
  const file = document.getElementById('fileInput')?.files[0];
  if (!file || !currentChat) return;

  const path = `images/${Date.now()}-${file.name}`;
  const { error } = await supabase.storage.from('chat-files').upload(path, file);
  if (error) return alert('Upload failed: ' + error.message);

  const { data } = supabase.storage.from('chat-files').getPublicUrl(path);
  await supabase.from('messages').insert({
    from_id: currentUser.id,
    to_id: currentChat.uid,
    image_url: data.publicUrl,
    seen: false,
    created_at: new Date().toISOString()
  });
}

// ══════════════════════════════════════════
//  VOICE MESSAGES
// ══════════════════════════════════════════
async function toggleRecording() {
  const btn = document.getElementById('voiceBtn');
  if (!btn) return;

  if (!isRecording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null);
    if (!stream) return alert('Microphone access denied');

    audioChunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => audioChunks.push(e.data);
    recorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const path = `voices/${Date.now()}.webm`;
      await supabase.storage.from('chat-files').upload(path, blob);
      const { data } = supabase.storage.from('chat-files').getPublicUrl(path);
      await supabase.from('messages').insert({
        from_id: currentUser.id,
        to_id: currentChat.uid,
        voice_url: data.publicUrl,
        seen: false,
        created_at: new Date().toISOString()
      });
    };

    recorder.start();
    isRecording = true;
    btn.classList.add('recording');
    btn.textContent = '⏹';
  } else {
    recorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
  }
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
