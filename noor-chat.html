<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a28; --surface3:#222235;
  --accent:#7c6aff; --accent2:#ff6a9e; --accent3:#6affcc;
  --text:#e8e8f0; --muted:#6b6b8a; --border:#2a2a40;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1230 0%,var(--bg) 70%)}
.login-box{width:360px;padding:44px 36px;background:var(--surface);border:1px solid var(--border);
  border-radius:24px;box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(124,106,255,.1);
  animation:slideUp .5s cubic-bezier(.16,1,.3,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.orb{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 20px rgba(124,106,255,.5);animation:pulse 3s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(124,106,255,.5)}50%{box-shadow:0 0 35px rgba(124,106,255,.8),0 0 60px rgba(255,106,158,.2)}}
.login-logo h1{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:7px}
.field input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,255,.15)}
.login-btns{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),#5a4de6);border:none;border-radius:10px;
  color:#fff;font-family:'Syne',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:opacity .2s,transform .15s}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:background .2s,border-color .2s}
.btn-secondary:hover{background:var(--surface2);border-color:var(--accent)}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,border-color .2s}
.btn-google:hover{background:var(--surface3);border-color:var(--accent)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
#authMsg{margin-top:12px;font-size:12px;text-align:center;color:var(--accent2);min-height:16px}

/* APP */
#appScreen{display:none;height:100vh;flex-direction:row}
.sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{display:flex;align-items:center;gap:9px}
.orb-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 10px rgba(124,106,255,.4)}
.sidebar-logo span{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--accent2);color:var(--accent2)}
.sidebar-me{padding:10px 18px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-section{padding:10px 18px 5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.users-list{flex:1;overflow-y:auto;padding:4px 8px 10px}
.users-list::-webkit-scrollbar{width:3px}
.users-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.user-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.user-item:hover{background:var(--surface2)}
.user-item.active{background:var(--surface3)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif}
.avatar.ai{background:linear-gradient(135deg,var(--accent),var(--accent3));box-shadow:0 0 10px rgba(124,106,255,.4);font-size:15px}
.avatar.human{background:var(--surface3);border:1px solid var(--border)}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-sub{font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);flex-shrink:0;box-shadow:0 0 4px rgba(106,255,204,.5)}
.dot.offline{background:var(--border);box-shadow:none}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.chat-header{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;min-height:62px}
.chat-header-info{flex:1}
.chat-header-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.chat-header-status{font-size:11px;color:var(--muted);margin-top:1px}
.chat-header-status.typing{color:var(--accent3)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
.empty-orb{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(124,106,255,.12),rgba(255,106,158,.12));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px}
.empty-state h3{font-family:'Syne',sans-serif;font-size:17px;color:var(--text)}
.empty-state p{font-size:13px}
.messages-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:5px;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:3px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg-row{display:flex;align-items:flex-end;gap:7px;animation:msgIn .25s cubic-bezier(.16,1,.3,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.me{flex-direction:row-reverse}
.msg-avatar{width:24px;height:24px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-family:'Syne',sans-serif}
.msg-row.me .msg-avatar{display:none}
.bubble{max-width:62%;padding:9px 13px;border-radius:15px;font-size:14px;line-height:1.5;position:relative;word-break:break-word}
.msg-row.me .bubble{background:linear-gradient(135deg,var(--accent),#5a4de6);border-bottom-right-radius:4px;color:#fff;box-shadow:0 4px 14px rgba(124,106,255,.3)}
.msg-row.other .bubble{background:#1e1e2e;border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-row.ai .bubble{background:#1a1a2e;border-bottom-left-radius:4px;border:1px solid rgba(124,106,255,.3);box-shadow:0 4px 14px rgba(124,106,255,.08)}
.ai-tag{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.bubble-time{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;text-align:right}
.msg-row.other .bubble-time,.msg-row.ai .bubble-time{color:var(--muted);text-align:left}
.tick.seen{color:var(--accent3)}
.bubble img{max-width:200px;border-radius:8px;display:block;margin-top:6px;cursor:pointer}
.bubble audio{margin-top:6px;width:200px;height:36px}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:11px 13px;background:#1e1e2e;border:1px solid var(--border);border-radius:15px;border-bottom-left-radius:4px;width:fit-content}
.typing-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:typingBounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.input-bar{padding:10px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.input-wrap{flex:1;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:0 10px;gap:6px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap input[type="text"]{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 0}
.input-wrap input[type="text"]::placeholder{color:var(--muted)}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:4px;transition:color .2s;line-height:1}
.icon-btn:hover{color:var(--accent)}
input[type="file"]{display:none}
.send-btn,.voice-btn{width:42px;height:42px;border-radius:11px;border:none;cursor:pointer;font-size:17px;transition:transform .15s,opacity .2s;display:flex;align-items:center;justify-content:center}
.send-btn{background:linear-gradient(135deg,var(--accent),#5a4de6);box-shadow:0 4px 14px rgba(124,106,255,.3)}
.voice-btn{background:var(--surface2);border:1px solid var(--border)}
.send-btn:hover,.voice-btn:hover{transform:translateY(-1px);opacity:.9}
.voice-btn.recording{background:var(--accent2);border-color:var(--accent2);animation:recordPulse 1s ease-in-out infinite}
@keyframes recordPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,106,158,.4)}50%{box-shadow:0 0 0 8px rgba(255,106,158,0)}}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px}
.lightbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:600px){
  .sidebar{width:100%;position:fixed;inset:0;z-index:100;transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .chat-area{width:100%}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="orb"></div>
      <h1>Noor Chat</h1>
    </div>
    <p class="login-sub">Your secure, AI-powered messenger</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')loginUser()">
    </div>
    <div class="login-btns">
      <button class="btn-primary" onclick="loginUser()">Login</button>
      <button class="btn-secondary" onclick="signupUser()">Sign Up</button>
    </div>
    <div class="divider">or</div>
    <button class="btn-google" onclick="googleLogin()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div id="authMsg"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="orb-sm"></div>
        <span>Noor</span>
      </div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
    <div class="sidebar-me" id="sidebarMe"></div>
    <div class="sidebar-section">Conversations</div>
    <div class="users-list" id="usersList"></div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-orb">💬</div>
      <h3>Welcome to Noor Chat</h3>
      <p>Select a contact or chat with Noor AI</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://qmztusvterlneulqomc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenR1c3Z0ZXJsZm5ldWxxb21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDYyMDMsImV4cCI6MjA4OTUyMjIwM30.Qba4aiV9jETl__yxu0Aj_Ulq_sK7eGGUMW1YQPKUtvs';
const GROQ_KEY      = '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';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser=null, currentChat=null, msgSub=null, typingTimer=null;
let isRecording=false, recorder=null, audioChunks=[];

// ── AUTH ──────────────────────────────────
async function signupUser(){
  const e=emailInput.value.trim(), p=passInput.value;
  if(!e||!p) return setMsg('⚠ Enter email and password');
  setMsg('Creating account…');
  const {data,error}=await sb.auth.signUp({email:e,password:p});
  if(error) return setMsg('⚠ '+error.message);
  if(data.user) await upsertProfile(data.user.id,e);
  setMsg('✅ Account created! Logging you in…');
}

async function loginUser(){
  const e=emailInput.value.trim(), p=passInput.value;
  if(!e||!p) return setMsg('⚠ Enter email and password');
  setMsg('Logging in…');
  const {error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error) return setMsg('⚠ '+error.message);
}

async function googleLogin(){
  setMsg('Opening Google…');
  const {error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.href}
  });
  if(error) setMsg('⚠ '+error.message);
}

async function logout(){
  if(currentUser) await sb.from('profiles').update({online:false}).eq('id',currentUser.id);
  await sb.auth.signOut();
}

async function upsertProfile(id,email){
  await sb.from('profiles').upsert({
    id, email, online:true, typing:false,
    updated_at:new Date().toISOString()
  });
}

function setMsg(t){ document.getElementById('authMsg').textContent=t; }

sb.auth.onAuthStateChange(async(_,session)=>{
  if(session){
    currentUser=session.user;
    await upsertProfile(currentUser.id, currentUser.email);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='flex';
    document.getElementById('sidebarMe').textContent='👤 '+currentUser.email;
    loadUsers();
  } else {
    currentUser=null;
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('appScreen').style.display='none';
  }
});

// ── USERS ─────────────────────────────────
async function loadUsers(){
  const {data}=await sb.from('profiles').select('*').neq('id',currentUser.id);
  renderUsers(data||[]);
  sb.channel('profiles-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'profiles'},()=>loadUsers())
    .subscribe();
}

function renderUsers(profiles){
  const list=document.getElementById('usersList');
  list.innerHTML='';
  list.appendChild(makeUserItem('AI_BOT','✦','Noor AI','LLaMA 3 · Groq',true,true));
  profiles.forEach(p=>{
    list.appendChild(makeUserItem(p.id,p.email[0].toUpperCase(),p.email,p.online?'Online':'Offline',false,p.online));
  });
}

function makeUserItem(uid,init,name,sub,isAI,online){
  const d=document.createElement('div');
  d.className='user-item'+(currentChat?.uid===uid?' active':'');
  d.innerHTML=`
    <div class="avatar ${isAI?'ai':'human'}">${init}</div>
    <div class="user-info">
      <div class="user-name">${esc(name)}</div>
      <div class="user-sub">${esc(sub)}</div>
    </div>
    <div class="dot ${online?'':'offline'}"></div>`;
  d.onclick=()=>{ document.getElementById('sidebar').classList.remove('open'); openChat(uid,name,isAI); };
  return d;
}

// ── OPEN CHAT ─────────────────────────────
function openChat(uid,name,isAI=false){
  currentChat={uid,name,isAI};
  document.querySelectorAll('.user-item').forEach(el=>el.classList.remove('active'));
  if(msgSub){ sb.removeChannel(msgSub); msgSub=null; }

  const ca=document.getElementById('chatArea');
  const avChar=isAI?'✦':name[0].toUpperCase();
  const avCls=isAI?'ai':'human';

  ca.innerHTML=`
    <div class="chat-header">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div class="avatar ${avCls}" style="width:34px;height:34px;font-size:${isAI?'15':'13'}px">${avChar}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${esc(name)}</div>
        <div class="chat-header-status" id="chatStatus">${isAI?'Noor AI · Groq LLaMA 3':'Loading…'}</div>
      </div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="msgInput" placeholder="Message ${esc(name)}…"
          oninput="onTyping()" onblur="stopTyping()"
          onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="icon-btn" onclick="document.getElementById('imgFile').click()" title="Send image">📷</button>
        <input type="file" id="imgFile" accept="image/*" onchange="sendImage()">
      </div>
      <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()" title="Voice message">🎤</button>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>`;

  loadMessages();
  if(!isAI) watchTyping(uid);
}

// ── MESSAGES ──────────────────────────────
async function loadMessages(){
  if(!currentChat) return;
  const uid=currentChat.uid, myId=currentUser.id;

  const {data}=await sb.from('messages').select('*')
    .or(`and(from_id.eq.${myId},to_id.eq.${uid}),and(from_id.eq.${uid},to_id.eq.${myId})`)
    .order('created_at',{ascending:true});

  const area=document.getElementById('messagesArea');
  if(!area) return;
  area.innerHTML='';
  (data||[]).forEach(m=>appendMsg(m,false));
  area.scrollTop=area.scrollHeight;

  const unseen=(data||[]).filter(m=>m.to_id===myId&&!m.seen).map(m=>m.id);
  if(unseen.length) await sb.from('messages').update({seen:true}).in('id',unseen);

  msgSub=sb.channel('msgs-'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},async p=>{
      const m=p.new;
      if((m.from_id===myId&&m.to_id===currentChat?.uid)||(m.from_id===currentChat?.uid&&m.to_id===myId)){
        appendMsg(m,true);
        if(m.to_id===myId&&!m.seen) await sb.from('messages').update({seen:true}).eq('id',m.id);
      }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>{
      const m=p.new;
      const el=document.querySelector(`[data-msgid="${m.id}"] .tick`);
      if(el&&m.seen){el.textContent=' ✔✔';el.classList.add('seen');}
    })
    .subscribe();
}

function appendMsg(m,scroll){
  const area=document.getElementById('messagesArea');
  if(!area) return;
  const isMe=m.from_id===currentUser.id;
  const isAI=m.from_id==='AI_BOT';
  const rowCls=isMe?'me':(isAI?'ai':'other');
  const time=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const tick=isMe?`<span class="tick ${m.seen?'seen':''}">${m.seen?' ✔✔':' ✔'}</span>`:'';
  const avChar=isAI?'✦':(currentChat?.name?.[0]?.toUpperCase()||'?');
  const avCls=isAI?'ai':'human';
  const aiTag=isAI?`<div class="ai-tag">✦ Noor AI</div>`:'';

  let content='';
  if(m.text) content+=esc(m.text).replace(/\n/g,'<br>');
  if(m.image_url) content+=`<img src="${m.image_url}" onclick="openLightbox(this.src)" alt="image">`;
  if(m.voice_url) content+=`<audio controls src="${m.voice_url}"></audio>`;

  const row=document.createElement('div');
  row.className=`msg-row ${rowCls}`;
  row.dataset.msgid=m.id;
  row.innerHTML=`
    <div class="msg-avatar avatar ${avCls}">${avChar}</div>
    <div class="bubble">${aiTag}${content}<div class="bubble-time">${time}${tick}</div></div>`;
  area.appendChild(row);
  if(scroll) area.scrollTop=area.scrollHeight;
}

// ── SEND TEXT ─────────────────────────────
async function sendMsg(){
  const input=document.getElementById('msgInput');
  if(!input||!currentChat) return;
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  stopTyping();

  await sb.from('messages').insert({
    from_id:currentUser.id, to_id:currentChat.uid,
    text, seen:false, created_at:new Date().toISOString()
  });

  if(currentChat.isAI){
    showTyping();
    const reply=await groqReply(text);
    hideTyping();
    await sb.from('messages').insert({
      from_id:'AI_BOT', to_id:currentUser.id,
      text:reply, seen:true, created_at:new Date().toISOString()
    });
  }
}

// ── SEND IMAGE (base64) ───────────────────
async function sendImage(){
  const file=document.getElementById('imgFile')?.files[0];
  if(!file||!currentChat) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    await sb.from('messages').insert({
      from_id:currentUser.id, to_id:currentChat.uid,
      image_url:e.target.result, seen:false,
      created_at:new Date().toISOString()
    });
  };
  reader.readAsDataURL(file);
  document.getElementById('imgFile').value='';
}

// ── VOICE (base64) ────────────────────────
async function toggleRecording(){
  const btn=document.getElementById('voiceBtn');
  if(!btn) return;
  if(!isRecording){
    const stream=await navigator.mediaDevices.getUserMedia({audio:true}).catch(()=>null);
    if(!stream) return alert('Microphone access denied');
    audioChunks=[];
    recorder=new MediaRecorder(stream);
    recorder.ondataavailable=e=>audioChunks.push(e.data);
    recorder.onstop=async()=>{
      const blob=new Blob(audioChunks,{type:'audio/webm'});
      const reader=new FileReader();
      reader.onload=async e=>{
        await sb.from('messages').insert({
          from_id:currentUser.id, to_id:currentChat.uid,
          voice_url:e.target.result, seen:false,
          created_at:new Date().toISOString()
        });
      };
      reader.readAsDataURL(blob);
    };
    recorder.start();
    isRecording=true;
    btn.classList.add('recording');
    btn.textContent='⏹';
  } else {
    recorder.stop();
    recorder.stream?.getTracks().forEach(t=>t.stop());
    isRecording=false;
    btn.classList.remove('recording');
    btn.textContent='🎤';
  }
}

// ── GROQ AI ───────────────────────────────
async function groqReply(msg){
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama3-70b-8192',
        messages:[
          {role:'system',content:'You are Noor, a friendly smart AI in Noor Chat. Be warm, concise and helpful.'},
          {role:'user',content:msg}
        ],
        max_tokens:500
      })
    });
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'Sorry, could not respond.';
  }catch{ return 'AI temporarily unavailable.'; }
}

// ── TYPING ────────────────────────────────
function onTyping(){
  if(!currentChat||currentChat.isAI) return;
  sb.from('profiles').update({typing:true}).eq('id',currentUser.id);
  clearTimeout(typingTimer);
  typingTimer=setTimeout(stopTyping,2000);
}
function stopTyping(){
  if(!currentChat||currentChat.isAI) return;
  sb.from('profiles').update({typing:false}).eq('id',currentUser.id);
}
function watchTyping(uid){
  sb.channel('typing-'+uid)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',filter:`id=eq.${uid}`},p=>{
      const s=document.getElementById('chatStatus');
      if(!s) return;
      s.textContent=p.new.typing?'typing…':(p.new.online?'Online':'Offline');
      s.className='chat-header-status'+(p.new.typing?' typing':'');
    }).subscribe();
}

function showTyping(){
  const area=document.getElementById('messagesArea');
  if(!area) return;
  const el=document.createElement('div');
  el.id='aiTyping';el.className='msg-row ai';
  el.innerHTML=`<div class="msg-avatar avatar ai">✦</div>
    <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(el);
  area.scrollTop=area.scrollHeight;
}
function hideTyping(){ document.getElementById('aiTyping')?.remove(); }

// ── LIGHTBOX ──────────────────────────────
function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
